<!DOCTYPE html>
<html>

<head>
<title>AI Browser Automation</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Browser Automation</h2>

<form action="/run" method="post">

<label>Website URL</label>
<input name="url" placeholder="https://amazon.com" required>

<label>Prompt</label>
<textarea name="prompt" placeholder="Is there a search bar?" required></textarea>

<button type="submit">Run Test</button>

</form>

</div>

</body>
</html>
